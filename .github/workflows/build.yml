name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: write
  discussions: write

jobs:
  build_release:
    name: Build Release (${{ matrix.variant }})
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK and Run Lint
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Release :app:lint${{ matrix.variantName }}Release --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: dev.ufoptg.musicx
          METROLIST_APP_NAME: MuSicX Nightly
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/${{ matrix.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move signed APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/release"
          mkdir -p "$OUTPUT_DIR/out"
          if [ "${{ matrix.variant }}" = "gms" ]; then
            TARGET_NAME="MuSicX-Nightly-with-Google-Cast.apk"
          else
            TARGET_NAME="MuSicX-Nightly.apk"
          fi
          find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | xargs -I{} mv {} "$OUTPUT_DIR/out/$TARGET_NAME"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.variant == 'gms' && 'MuSicX-Nightly-with-Google-Cast' || 'MuSicX-Nightly' }}
          path: app/build/outputs/apk/${{ matrix.variant }}/release/out/*

  build_debug:
    name: Build Debug (${{ matrix.variant }})
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore Persistent Keystore
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ./app/persistent-debug.keystore

      - name: Build Debug APK and Run Lint
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Debug :app:lint${{ matrix.variantName }}Debug --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: dev.ufoptg.musicx
          METROLIST_APP_NAME: MuSicX Nightly
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.variant == 'gms' && 'MuSicX-Nightly-debug-with-Google-Cast' || 'MuSicX-Nightly-debug' }}
          path: app/build/outputs/apk/${{ matrix.variant }}/debug/*.apk

  # Publishes the just-built release APKs (foss + gms) as a rolling GitHub
  # pre-release tagged `nightly`. Marked `--prerelease --latest=false`, so
  # the "Latest release" badge continues to point at whatever stable tag
  # release.yml last published — nightlies never masquerade as stable.
  #
  # Only runs on pushes to `main` (not PRs, not other branches, not
  # workflow_dispatch on random refs) to avoid firehosing the releases
  # page with builds from feature branches.
  publish_nightly:
    name: Publish Nightly Pre-Release
    needs: [build_release]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release APK artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: MuSicX-Nightly*
          path: nightly_apks/
          merge-multiple: false

      - name: Gather APKs into out/
        run: |
          set -euo pipefail
          mkdir -p out
          # Copy each APK and prefix its filename with the artifact name so
          # foss and gms builds don't collide on disk.
          find nightly_apks -mindepth 2 -name "*.apk" -print0 \
            | while IFS= read -r -d '' apk; do
                artifact=$(basename "$(dirname "$apk")")
                base=$(basename "$apk")
                cp "$apk" "out/${artifact}-${base}"
              done
          echo "Assembled APKs:"
          ls -la out/

      - name: Compose release notes
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE_UTC=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "## MuSicX Nightly · ${DATE_UTC} (${SHORT_SHA})"
            echo ""
            echo "Rolling **pre-release** built automatically from the latest commit on \`main\`."
            echo "Not marked as \"Latest release\" — the stable tag from \`release.yml\` keeps that badge."
            echo ""
            echo "> ⚠️ Nightlies may include unreleased features or partially-tested changes. Use at your own risk."
            echo ""
            echo "### Recent commits"
            git log -15 --pretty=format:'- %s (%an)' --no-merges
            echo ""
          } > nightly_notes.md
          echo "--- notes ---"
          cat nightly_notes.md

      - name: Publish nightly pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Drop the previous nightly release + its tag so the new one can
          # take the same `nightly` tag without conflict. `|| true` keeps
          # the workflow green on the very first run when there's nothing
          # to delete.
          gh release delete nightly --yes --cleanup-tag || true

          gh release create nightly \
            --title "MuSicX Nightly ($(git rev-parse --short HEAD))" \
            --notes-file nightly_notes.md \
            --prerelease \
            --latest=false \
            --target "$GITHUB_SHA" \
            out/*.apk

      - name: Nightly release summary
        run: |
          echo "## Nightly Pre-Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`nightly\` (rolling)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`$(git rev-parse --short HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APKs**: $(ls out/*.apk | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: https://github.com/${{ github.repository }}/releases/tag/nightly" >> "$GITHUB_STEP_SUMMARY"
