name: Sync Upstream Metrolist

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-metrolist
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: https://github.com/MetrolistGroup/Metrolist.git
      UPSTREAM_BRANCH: main
      LOCAL_BASE: main
      SYNC_BRANCH_PREFIX: chore/sync-upstream

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v6
        with:
          ref: ${{ env.LOCAL_BASE }}
          fetch-depth: 0
          persist-credentials: true

      - name: Fix permissions
        run: |
          chmod -R u+rwX .
          git config --global --add safe.directory /github/workspace

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream + fetch
        run: |
          git remote add upstream "$UPSTREAM_URL" || true
          git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH" --tags

      - name: Compute divergence
        id: diff
        run: |
          behind=$(git rev-list --count "$LOCAL_BASE..upstream/$UPSTREAM_BRANCH")
          ahead=$(git rev-list --count "upstream/$UPSTREAM_BRANCH..$LOCAL_BASE")
          echo "behind=$behind" >> "$GITHUB_OUTPUT"
          echo "ahead=$ahead" >> "$GITHUB_OUTPUT"
          if [[ "$behind" == "0" ]]; then
            echo "Already up to date. Nothing to sync."
          fi

      - name: Short-circuit if up to date
        if: steps.diff.outputs.behind == '0'
        run: echo "::notice::Nothing to sync. Exiting successfully."

      - name: Skip if an open sync PR already exists
        if: steps.diff.outputs.behind != '0'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --search "head:${SYNC_BRANCH_PREFIX}- in:title Sync upstream Metrolist" --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch + attempt merge
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        id: merge
        run: |
          stamp=$(date -u +%Y%m%d-%H%M)
          branch="${SYNC_BRANCH_PREFIX}-${stamp}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch" "$LOCAL_BASE"

          set +e
          git merge --no-ff "upstream/$UPSTREAM_BRANCH" -m "chore: sync upstream MetrolistGroup/Metrolist@main"
          status=$?
          set -e

          if [[ "$status" -eq 0 ]]; then
            echo "clean_merge=true" >> "$GITHUB_OUTPUT"
            echo "conflicting_files=" >> "$GITHUB_OUTPUT"
          else
            echo "clean_merge=false" >> "$GITHUB_OUTPUT"
            conflicts=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            {
              echo "conflicting_files<<CONFLICT_EOF"
              git diff --name-only --diff-filter=U
              echo "CONFLICT_EOF"
            } >> "$GITHUB_OUTPUT"
            git add -A
            git commit --no-verify -m "chore: sync upstream MetrolistGroup/Metrolist@main (CONFLICTS)" -m "Files requiring manual resolution: $conflicts"
          fi

      - name: Collect PR body content
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        id: body
        run: |
          commits_md=$(git log --oneline --no-decorate "$LOCAL_BASE..upstream/$UPSTREAM_BRANCH" | sed 's/^/- /')
          files_md=$(git diff --stat --no-color "$LOCAL_BASE..upstream/$UPSTREAM_BRANCH" | tail -n 40 | sed 's/[()]/\\&/g' || echo "Large diff")

          {
            echo "body<<PR_BODY_EOF"
            echo "## What"
            echo "Auto-generated PR to bring ufoptg/MuSicX up to date with upstream Metrolist."
            echo ""
            echo "- Behind by: ${{ steps.diff.outputs.behind }} commits"
            echo ""
            echo "## Reviewer checklist"
            echo "- [ ] Verify no MuSicX features regressed"
            echo "- [ ] Check CI builds"
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        run: git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open Pull Request
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          # Create labels safely
          gh label create upstream-sync --color 0E8A16 --description "Automated upstream Metrolist sync" 2>/dev/null || true
          gh label create needs-manual-resolution --color D93F0B --description "Merge conflicts require human review" 2>/dev/null || true

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "chore: sync upstream Metrolist" \
            --body "${{ steps.body.outputs.body }}" \
            --label upstream-sync || echo "PR may already exist or creation failed"
