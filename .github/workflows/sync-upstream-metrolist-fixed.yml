name: Sync Upstream Metrolist

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write          # required for `gh label create`

concurrency:
  group: sync-upstream-metrolist
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: https://github.com/MetrolistGroup/Metrolist.git
      UPSTREAM_BRANCH: main
      LOCAL_BASE: main
      SYNC_BRANCH_PREFIX: chore/sync-upstream

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.LOCAL_BASE }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Add upstream + fetch
        run: |
          git remote add upstream "$UPSTREAM_URL" || true
          git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH" --tags

      - name: Compute divergence
        id: diff
        run: |
          behind=$(git rev-list --count "$LOCAL_BASE..upstream/$UPSTREAM_BRANCH")
          ahead=$(git rev-list --count "upstream/$UPSTREAM_BRANCH..$LOCAL_BASE")
          echo "behind=$behind" >> "$GITHUB_OUTPUT"
          echo "ahead=$ahead" >> "$GITHUB_OUTPUT"
          if [[ "$behind" == "0" ]]; then
            echo "::notice::Already up to date. Nothing to sync."
          fi

      # Create labels EARLY. No continue-on-error so real failures surface.
      - name: Ensure labels exist
        if: steps.diff.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create upstream-sync --color 0E8A16 \
            --description "Automated upstream Metrolist sync" --force
          gh label create needs-manual-resolution --color D93F0B \
            --description "Merge conflicts require human review" --force

      - name: Skip if an open sync PR already exists
        if: steps.diff.outputs.behind != '0'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title chore: sync upstream Metrolist" \
            --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch + attempt merge
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        id: merge
        run: |
          stamp=$(date -u +%Y%m%d-%H%M)
          branch="${SYNC_BRANCH_PREFIX}-${stamp}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch" "$LOCAL_BASE"

          set +e
          git merge --no-ff "upstream/$UPSTREAM_BRANCH" -m "chore: sync upstream MetrolistGroup/Metrolist@main"
          status=$?
          set -e

          if [[ "$status" -eq 0 ]]; then
            echo "clean_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "clean_merge=false" >> "$GITHUB_OUTPUT"
            conflicts=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            git add -A
            git commit --no-verify \
              -m "chore: sync upstream MetrolistGroup/Metrolist@main (CONFLICTS)" \
              -m "Files requiring manual resolution: $conflicts"
          fi

      - name: Collect PR body content
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        id: body
        run: |
          {
            echo "body<<PR_BODY_EOF"
            echo "## What"
            echo "Auto-generated PR to bring this repo up to date with upstream Metrolist."
            echo ""
            echo "- Behind by: ${{ steps.diff.outputs.behind }} commits"
            echo "- Clean merge: ${{ steps.merge.outputs.clean_merge }}"
            echo ""
            echo "## Reviewer checklist"
            echo "- [ ] Verify no custom features regressed"
            echo "- [ ] Check CI builds"
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        run: git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open Pull Request
        if: steps.diff.outputs.behind != '0' && steps.existing_pr.outputs.skip != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "chore: sync upstream Metrolist" \
            --body "${{ steps.body.outputs.body }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"

          # Attach labels AFTER PR exists (retries cleanly, avoids race with label creation)
          if [[ "${{ steps.merge.outputs.clean_merge }}" == "true" ]]; then
            gh pr edit "$url" --add-label "upstream-sync"
          else
            gh pr edit "$url" --add-label "upstream-sync,needs-manual-resolution"
          fi

      # OPTIONAL: auto-merge only when the merge was clean (no conflicts).
      - name: Enable auto-merge on clean sync
        if: >
          steps.diff.outputs.behind != '0' &&
          steps.existing_pr.outputs.skip != 'true' &&
          steps.merge.outputs.clean_merge == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.url }}" --squash --auto || \
            echo "Auto-merge not enabled (may need branch protection / auto-merge setting)."
